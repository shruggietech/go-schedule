name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & vet
    runs-on: ubuntu-latest
    # CGO off so the cgo-only GUI entry point resolves to its stub (the OpenGL
    # driver is not installed on this job); the rest of the tree is cgo-free.
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -l internal cmd test)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      # Run via `go run` so golangci-lint is compiled with the runner's Go
      # toolchain (the prebuilt release binaries are built with an older Go and
      # refuse a module targeting a newer Go language version).
      - name: golangci-lint
        run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6 run ./...

  test:
    name: Test (race) — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # The race detector requires cgo; the CI runners provide a C toolchain.
      # Excluded here (verified by the dedicated `gui` job instead):
      #  - cmd/gosched-gui: cgo-only, needs OpenGL.
      #  - gui: the Fyne widget package; `-race` flags races inside Fyne's own
      #    font cache (go-text/typesetting), not our code.
      # The pure-Go gui/viewmodel package stays race-tested.
      - name: go test -race
        shell: bash
        env:
          CGO_ENABLED: "1"
        run: go test -race $(go list ./... | grep -vE '/cmd/gosched-gui|/gui$')

  coverage:
    name: Coverage gate (core packages ≥80%)
    runs-on: ubuntu-latest
    # Core packages are cgo-free; CGO off avoids needing the GUI's OpenGL libs.
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # Runs the same script contributors run locally (see CLAUDE.md). One
      # implementation, so the local check and the CI check cannot drift into
      # measuring different things.
      - name: Measure core-package statement coverage
        run: sh scripts/coverage-gate.sh

  build:
    name: Cross-compile (daemon + CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build all targets (cgo-free)
        env:
          CGO_ENABLED: "0"
        run: |
          set -e
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            os=${target%/*}; arch=${target#*/}
            echo "building $os/$arch"
            GOOS=$os GOARCH=$arch go build -o /dev/null ./cmd/goschedd ./cmd/gosched
          done

  gui:
    name: GUI build & test (cgo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install Fyne build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev libxkbcommon-dev
      - name: Build GUI (cgo + OpenGL driver)
        env:
          CGO_ENABLED: "1"
        run: go build -o /dev/null ./cmd/gosched-gui
      - name: Test GUI (headless)
        env:
          CGO_ENABLED: "1"
        run: go test ./gui/...
